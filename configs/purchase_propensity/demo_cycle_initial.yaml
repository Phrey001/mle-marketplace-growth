train_start_date: "2009-12-09" # first-year baseline cycle start (monthly snapshots)
train_end_date: "2010-11-09" # first-year baseline cycle end (12 snapshots total)
train_frequency: "monthly" # snapshot cadence (monthly only)
score_as_of_date: "2010-11-09" # cycle score/evaluation snapshot
window_selection_mode: "sensitivity" # run structural search and freeze on initial cycle
