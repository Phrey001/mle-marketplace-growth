train_start_date: "2010-06-09" # monthly panel start for training snapshots
train_end_date: "2011-11-09" # monthly panel end for training snapshots
train_frequency: "monthly" # snapshot cadence (current pipeline supports monthly only)
score_as_of_date: "2011-11-09" # snapshot date used for scoring/evaluation artifacts
validation_mode: "out_of_time" # validation split mode: hash or out_of_time
validation_rate: 0.2 # holdout fraction for validation slicing
prediction_window_days: 30 # allowed: [30, 60, 90]; main pipeline currently wired for 30
feature_lookback_days: 90 # allowed: [60, 90, 120]; main pipeline currently wired for 90
sensitivity_as_of_date: "2011-09-09" # snapshot date used by window_sensitivity run
target_rate: 0.2 # policy targeting share (e.g., 0.2 means top 20%)
budget: 5000.0 # budget used in offline policy allocation
cost_per_user: 5.0 # assumed unit incentive cost per targeted user
