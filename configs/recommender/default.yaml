# Event window (applies to full recommender pipeline)
recommender_min_event_date: "2010-12-01" # canonical demo training window start
recommender_max_event_date: "2011-11-30" # canonical demo training window end

# Two-tower model params (PyTorch retrieval model only)
embedding_dim: 64 # learned vector size
epochs: 12 # max training passes
learning_rate: 0.003 # neural training step size
negative_samples: 8 # sampled negatives per positive example
batch_size: 4096 # training examples per optimization step
l2_reg: 0.0001 # light regularization
max_grad_norm: 1.0 # gradient clipping limit (0 disables clipping)
early_stop_rounds: 4 # non-improving validation rounds before stop
early_stop_k: 20 # validation cutoff used for early stopping
early_stop_tolerance: 0.0001 # minimum improvement to count as progress
temperature: 0.7 # sharpness of two-tower training loss

# MF baseline params (TruncatedSVD baseline only)
mf_components: 64 # MF latent factor size
mf_n_iter: 15 # SVD optimization iterations
mf_weighting: "tfidf" # allowed: binary|tfidf

# Evaluation + serving params (applies after model training)
top_k: 20 # number of items returned per user
