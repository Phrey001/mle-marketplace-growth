# Event window (applies to full recommender pipeline)
recommender_min_event_date: "2010-12-01" # lower bound for interaction events used by all models
recommender_max_event_date: "2011-11-30" # upper bound for interaction events used by all models

# Two-tower model params (PyTorch retrieval model only)
embedding_dim: 64 # larger than 32 with practical runtime for this dataset
epochs: 12 # relies on early stopping to cap runtime
learning_rate: 0.003 # stable AdamW setting
negative_samples: 8 # adds contrastive signal for ranking
batch_size: 4096 # good CPU throughput without high memory pressure
l2_reg: 0.0001 # light regularization
max_grad_norm: 1.0 # gradient clipping (0 disables clipping)
early_stop_rounds: 4 # stop after this many non-improving epochs
early_stop_k: 20 # K used for early-stop metric
early_stop_tolerance: 0.0001 # minimum improvement to count as progress
temperature: 0.7 # softmax sharpening
tower_hidden_dim: 0 # embedding-only towers; set >0 to enable MLP towers experimentally
tower_dropout: 0.0 # applies only when tower_hidden_dim > 0

# MF baseline params (TruncatedSVD baseline only)
mf_components: 64 # stronger than 32 while still fast
mf_n_iter: 15 # stable SVD fit for this demo scale
mf_weighting: "tfidf" # downweights head items

# Evaluation + serving params (applies after model training)
top_k: 20 # serving depth for candidate retrieval
top_ks: "10,20" # evaluation cutoffs
